<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>CometBrew | Digital Excellence — Web Design, AI Development & UI/UX</title>
    <meta name="description" content="CometBrew builds high-performance websites, AI-powered applications, and stunning UI/UX experiences for forward-thinking brands. Start your digital transformation today." />
    <meta name="keywords" content="web development agency, UI UX design, AI development, digital agency, React development, Next.js, mobile app development, SaaS development, CometBrew" />
    <meta name="author" content="CometBrew" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.cometbrew.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.cometbrew.com/" />
    <meta property="og:title" content="CometBrew | Digital Excellence — Web Design & AI Development" />
    <meta property="og:description" content="We combine AI-driven development with award-winning design to build products that scale. Trusted by forward-thinking brands worldwide." />
    <meta property="og:image" content="https://www.cometbrew.com/og-banner.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CometBrew — Digital Excellence" />
    <meta property="og:site_name" content="CometBrew" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cometbrew" />
    <meta name="twitter:creator" content="@cometbrew" />
    <meta name="twitter:title" content="CometBrew | Digital Excellence" />
    <meta name="twitter:description" content="AI-driven development + award-winning design. We build digital products that scale." />
    <meta name="twitter:image" content="https://www.cometbrew.com/og-banner.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/Comet%20Brew%20Favicon-01.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CometBrew",
      "url": "https://www.cometbrew.com",
      "logo": "https://www.cometbrew.com/Comet%20Brew%20OG%20Image%20Banner-01.jpg",
      "description": "A digital agency specializing in web development, AI-powered applications, and UI/UX design for forward-thinking brands.",
      "email": "hello@cometbrew.com",
      "sameAs": [
        "https://twitter.com/cometbrew",
        "https://linkedin.com/company/cometbrew",
        "https://github.com/cometbrew"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "hello@cometbrew.com",
        "availableLanguage": ["English", "Spanish", "French", "German", "Japanese"]
      },
      "offers": {
        "@type": "AggregateOffer",
        "description": "Web development, UI/UX design, AI integration, and digital transformation services"
      }
    }
    </script>

    <!-- Structured Data: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CometBrew",
      "url": "https://www.cometbrew.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.cometbrew.com/portfolio?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
